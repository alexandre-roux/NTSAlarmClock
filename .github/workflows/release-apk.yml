name: Release Android APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Decode keystore and create keystore.properties
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/release.jks

          cat <<EOF > ${{ github.workspace }}/keystore.properties
          storeFile=release.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build release APK
        env:
          VERSION_NAME: ${{ github.ref_name }}
        run: ./gradlew :app:assembleRelease --build-cache --configuration-cache --parallel

      - name: Prepare APK files
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mv app/build/outputs/apk/release/app-release.apk "NTSAlarmClock-${VERSION}.apk"
          cp "NTSAlarmClock-${VERSION}.apk" "NTSAlarmClock-latest.apk"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: NTSAlarmClock-*.apk
          generate_release_notes: true